function pD(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fD(s){return pD(s).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function dB(a,b){return Math.round((pD(b)-pD(a))/864e5)}
function dT(s){return Math.round((pD(s)-TODAY)/864e5)}
function wkOf(s){var d=pD(s);var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff)).toISOString().slice(0,10)}
function crd(x){return Object.assign({background:CL.card,border:'1px solid '+CL.bdr,borderRadius:10,padding:'20px 24px',marginBottom:16},x||{})}
function ttl(){return{fontSize:15,fontWeight:600,color:CL.txt,marginBottom:4}}
function badge(bg,fg,t){return h('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:600,background:bg,color:fg}},t)}

// ─── Gantt helpers ─────────────────────────────────────────────────
var GANTT_SD='2026-04-03',GANTT_ED='2026-07-05',GANTT_TOT=dB(GANTT_SD,GANTT_ED);
function gmp(date){return Math.max(0,dB(GANTT_SD,date))/GANTT_TOT*100}
function gbp(start,end,color){
  var l=Math.max(0,dB(GANTT_SD,start))/GANTT_TOT*100;
  var w=Math.max(0.6,dB(start,end)+1)/GANTT_TOT*100;
  return{position:'absolute',left:l+'%',width:Math.min(w,100-l)+'%',height:20,borderRadius:3,background:color+'28',border:'1px solid '+color+'55',top:0,display:'flex',alignItems:'center',paddingLeft:4,overflow:'hidden'};
}
function getMarkers(){
  var markers=[];var md=new Date(2026,3,6);var ed=pD(GANTT_ED);
  while(md<ed){
    var ds=md.getFullYear()+'-'+String(md.getMonth()+1).padStart(2,'0')+'-'+String(md.getDate()).padStart(2,'0');
    markers.push({d:ds,l:md.toLocaleDateString('en-US',{month:'short',day:'numeric'})});
    md=new Date(md.getTime()+7*864e5);
  }
  return markers;
}
function getAllOwners(){
  var set={};
  WS.forEach(function(ws){ws.tasks.forEach(function(t){
    t.w.split(/[+\/,\u00B7]/).forEach(function(o){var n=o.replace(/\(.+?\)/g,'').trim();if(n&&n.length>1)set[n]=1});
  })});
  return Object.keys(set).sort();
}

  var urgent=WS.reduce(function(s,w){return s+w.tasks.filter(function(t){return t.st==='urgent'}).length},0);
  var gfs=useState('all');var ganttFilter=gfs[0];var setGanttFilter=gfs[1];
  var gos=useState('all');var ganttOwner=gos[0];var setGanttOwner=gos[1];
  var ghs=useState(null);var hovered=ghs[0];var setHovered=ghs[1];
  var markers=getMarkers();
  var allOwners=getAllOwners();

  var filteredWS=WS.map(function(ws){
    if(ganttFilter!=='all'&&ws.id!==ganttFilter)return null;
    var tasks=ws.tasks;
    if(ganttOwner!=='all'){tasks=tasks.filter(function(t){return t.w.toLowerCase().indexOf(ganttOwner.toLowerCase())>=0})}
    if(tasks.length===0)return null;
    return{nm:ws.nm,c:ws.c,id:ws.id,tasks:tasks};
  }).filter(Boolean);

  return h('div',null,
    // Stats
    h('div',{style:{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}},

          d>0?h('span',{style:{fontFamily:MO,fontSize:9,color:d<=7?CL.red:CL.lt}},d+'d'):null

    ),

    // ── GANTT CHART
    h('div',{style:crd({overflowX:'auto',padding:'20px 20px'})},

          h('div',{style:ttl()},'Project Timeline'),
          h('div',{style:{fontSize:11,color:CL.lt,fontFamily:MO}},'Working days only \u00B7 Weekends + holidays excluded')

        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},

              h('option',{value:'all'},'All Streams'),
              WS.map(function(ws){return h('option',{key:ws.id,value:ws.id},ws.nm)})
            )
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:4}},
            h('span',{style:{fontSize:10,color:CL.lt,fontFamily:MO}},'Owner:'),
            h('select',{value:ganttOwner,onChange:function(e){setGanttOwner(e.target.value)},style:{fontSize:11,padding:'4px 8px',borderRadius:5,border:'1px solid '+CL.bdr,fontFamily:SA,background:'#fff',cursor:'pointer'}},
              h('option',{value:'all'},'All Owners'),
              allOwners.map(function(o){return h('option',{key:o,value:o},o)})
            )
          ),
          (ganttFilter!=='all'||ganttOwner!=='all')?h('button',{onClick:function(){setGanttFilter('all');setGanttOwner('all')},style:{fontSize:10,padding:'4px 8px',borderRadius:5,border:'1px solid '+CL.bdr,background:CL.alt,cursor:'pointer',fontFamily:SA,color:CL.mid}},'Reset'):null
        )
      ),
      h('div',{style:{minWidth:1000}},
        // Week headers
        h('div',{style:{display:'flex',marginLeft:280}},
          h('div',{style:{flex:1,position:'relative',height:28}},
            markers.map(function(w,i){return h('div',{key:i,style:{position:'absolute',left:gmp(w.d)+'%',fontSize:9,color:CL.lt,fontFamily:MO,transform:'translateX(-50%)',borderLeft:'1px solid '+CL.gd,paddingLeft:3,height:20,zIndex:1}},w.l)}),
            MS.filter(function(m){return m.c}).map(function(m,i){
              return h('div',{key:'m'+i,title:fD(m.d)+': '+m.l,style:{position:'absolute',left:gmp(m.d)+'%',top:22,width:0,height:0,borderLeft:'4px solid transparent',borderRight:'4px solid transparent',borderTop:'5px solid '+CL.red,transform:'translateX(-50%)',cursor:'default',zIndex:2}});
            })
          )
        ),
        h('div',{style:{display:'flex',marginLeft:280,marginBottom:2}},
          h('div',{style:{flex:1,position:'relative',height:12}},
            h('div',{style:{position:'absolute',left:gmp('2026-04-03')+'%',fontSize:8,color:CL.red,fontFamily:MO,fontWeight:700,transform:'translateX(-50%)',zIndex:1}},'TODAY')
          )
        ),
        filteredWS.length===0?h('div',{style:{padding:20,textAlign:'center',color:CL.lt,fontSize:12}},'No tasks match the current filters.'):

              h('div',{style:{width:280,flexShrink:0,color:ws.c,fontSize:11,fontWeight:700,textAlign:'right',paddingRight:14,fontFamily:MO}},ws.nm)
            ),
            ws.tasks.map(function(t,ti){
              var isAsap=t.d==='ASAP';
              var sameDayTask=t.s===t.e;
              var isOngoing=t.d&&t.d.indexOf('Ongoing')>=0;
              var taskKey=ws.id+'-'+ti;
              var isHov=hovered===taskKey;
              return h('div',{key:ti,
                onMouseEnter:function(){setHovered(taskKey)},
                onMouseLeave:function(){setHovered(null)},
                style:{display:'flex',alignItems:'center',marginBottom:1,background:isHov?ws.c+'06':'transparent',borderRadius:3,transition:'background 0.15s',position:'relative'}},
                h('div',{title:t.t+' \u2014 '+t.w,style:{width:280,flexShrink:0,fontSize:11,color:isHov?CL.txt:CL.mid,textAlign:'right',paddingRight:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontWeight:isHov?600:400,transition:'color 0.15s'}},t.t),
                h('div',{style:{flex:1,position:'relative',height:22}},
                  markers.map(function(w,i){return h('div',{key:'g'+i,style:{position:'absolute',left:gmp(w.d)+'%',top:0,width:1,height:'100%',background:CL.gd}})}),
                  h('div',{style:{position:'absolute',left:gmp('2026-04-03')+'%',top:0,width:1.5,height:'100%',background:CL.red+'44',zIndex:1}}),
                  isAsap?h('div',{style:{position:'absolute',left:gmp(t.s)+'%',top:3,transform:'translateX(-50%)',zIndex:2}},
                    h('div',{style:{fontSize:8,fontWeight:700,color:ws.c,fontFamily:MO,background:ws.c+'15',padding:'1px 6px',borderRadius:3,border:'1px solid '+ws.c+'33'}},'ASAP')

function TasksPage(){
  var vs=useState('stream');var view=vs[0];var setView=vs[1];
  var fs=useState('all');var filter=fs[0];var setFilter=fs[1];
  var all=[];
  WS.forEach(function(ws){ws.tasks.forEach(function(t){all.push(Object.assign({},t,{sn:ws.nm,si:ws.id,c:ws.c}))})});
  all.sort(function(a,b){return pD(a.s)-pD(b.s)});
  var bw={};all.forEach(function(t){var w=wkOf(t.s);if(!bw[w])bw[w]=[];bw[w].push(t)});
  var wks=Object.keys(bw).sort();
  var bo={};all.forEach(function(t){
    var ow=t.w.split(/[+\/,\u00B7]/).map(function(o){return o.replace(/\(.+?\)/g,'').trim()}).filter(function(o){return o&&o.length>1});
    ow.forEach(function(o){if(!bo[o])bo[o]=[];bo[o].push(t)});
  });

  return h('div',null,
    h('div',{style:{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap',alignItems:'center'}},
      h('div',{style:{fontSize:12,fontWeight:600,color:CL.txt,marginRight:6}},'View:'),
      ['stream','week','owner'].map(function(v){
        return h('button',{key:v,onClick:function(){setView(v)},style:{
          padding:'6px 14px',borderRadius:6,border:'1px solid '+(view===v?CL.txt:CL.bdr),
          cursor:'pointer',fontSize:12,fontWeight:500,fontFamily:SA,
          background:view===v?CL.txt:'#fff',color:view===v?'#fff':CL.mid
        }},{stream:'By Workstream',week:'By Week',owner:'By Owner'}[v]);
      })
    ),
    view==='stream'&&h('div',null,
      h('div',{style:{display:'flex',gap:4,marginBottom:12,flexWrap:'wrap'}},
        ['all'].concat(WS.map(function(w){return w.id})).map(function(f){
          var ws=WS.find(function(w){return w.id===f});
          return h('button',{key:f,onClick:function(){setFilter(f)},style:{
            padding:'5px 10px',borderRadius:6,border:'1px solid '+(filter===f?(ws?ws.c:CL.txt):CL.bdr),
            cursor:'pointer',fontSize:11,fontFamily:SA,background:filter===f?(ws?ws.c+'11':'#f5f5f5'):'#fff',color:filter===f?(ws?ws.c:CL.txt):CL.mid
          }},f==='all'?'All':ws.nm);
        })
      ),
      WS.filter(function(ws){return filter==='all'||ws.id===filter}).map(function(ws,i){
        var showApprover=ws.id!=='sol'&&ws.id!=='venue'&&ws.id!=='ops';
        return h('div',{key:i,style:crd({borderLeft:'3px solid '+ws.c})},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
            h('div',null,h('div',{style:ttl()},ws.nm),h('div',{style:{fontSize:11,color:CL.lt,fontFamily:MO}},ws.ow)),
            badge(ws.c+'11',ws.c,ws.tasks.length+' tasks')
          ),
          tTbl(ws.tasks.map(function(t){return Object.assign({},t,{sn:ws.nm,c:ws.c})}),showApprover)
        );
      })
    ),
    view==='week'&&h('div',null,
      wks.map(function(wk){
        var ts=bw[wk];
        var we=function(){var d=pD(wk);d.setDate(d.getDate()+6);return d.toISOString().slice(0,10)}();
        return h('div',{key:wk,style:crd({borderLeft:'3px solid '+CL.course})},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
            h('div',{style:ttl()},fD(wk)+' \u2013 '+fD(we)),badge(CL.course+'11',CL.course,ts.length+' tasks')
          ),tTbl(ts,true)
        );
      })
    ),
    view==='owner'&&h('div',null,
      Object.keys(bo).sort().map(function(o){
        return h('div',{key:o,style:crd()},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
            h('div',{style:ttl()},o),badge(CL.alt,CL.mid,bo[o].length+' tasks')
          ),tTbl(bo[o],true)
        );
      })
    )
  );

  var cols=[th2('Task'),th2('Stream'),th2('Start'),th2('End'),th2('Owner')];
  if(showApprover)cols.push(th2('Approver'));
  cols.push(th2('Status'),th2('Depends on'));
  return h('div',{style:{overflowX:'auto'}},h('table',{style:{width:'100%',fontSize:12,minWidth:750}},
    h('thead',null,h('tr',null,cols)),
    h('tbody',null,tasks.map(function(t,i){
      var isAsap=t.d==='ASAP';
      var isOngoing=t.d&&t.d.indexOf('Ongoing')>=0;
      var cells=[
        h('td',{key:'t',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd,fontWeight:500,minWidth:200}},t.t),
        t.sn?h('td',{key:'s',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd}},h('span',{style:{fontSize:10,padding:'1px 6px',borderRadius:3,background:(t.c||CL.mid)+'11',color:t.c||CL.mid,fontWeight:600,whiteSpace:'nowrap'}},t.sn)):h('td',{key:'s',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd}},''),
        h('td',{key:'sd',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd,fontFamily:MO,fontSize:10,whiteSpace:'nowrap'}},isAsap?'ASAP':fD(t.s)),
        h('td',{key:'ed',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd,fontFamily:MO,fontSize:10,whiteSpace:'nowrap'}},isAsap?'\u2014':(isOngoing?'Ongoing':fD(t.e))),
        h('td',{key:'w',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd,fontSize:11,minWidth:140}},t.w||'\u2014'),
      ];
      if(showApprover)cells.push(h('td',{key:'a',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd,fontSize:11}},t.a||'\u2014'));
      cells.push(
        h('td',{key:'st',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd}},badge(t.st==='urgent'?'#fef2f2':'#f5f5f5',t.st==='urgent'?'#b91c1c':'#737373',t.st.toUpperCase())),
        h('td',{key:'d',style:{padding:'7px 10px',borderBottom:'1px solid '+CL.gd,fontSize:10,color:CL.lt,minWidth:140}},t.d||'\u2014')
      );
      return h('tr',{key:i,style:{background:t.st==='urgent'?'#fef2f2':'transparent'}},cells);
    }))
  ));
